<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engram — Causal Knowledge Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/graph.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- Grain Overlay -->
  <div class="grain-overlay"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">Engram</span>
    </div>
    <div class="header-center">
      <div class="search-container">
        <input type="text" class="search-input" placeholder="search decisions, e.g. database for high throughput...">
        <div class="search-scan-line"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="stats-row">
        <div class="stat"><span class="stat-value" id="stat-decisions">0</span><span class="stat-label">decisions</span></div>
        <div class="stat"><span class="stat-value" id="stat-counterfactuals">0</span><span class="stat-label">counterfactuals</span></div>
        <div class="stat"><span class="stat-value" id="stat-weight">0.000</span><span class="stat-label">avg weight</span></div>
      </div>
      <button class="btn btn-accent btn-bordered" id="btn-ingest">+ Ingest</button>
      <button class="btn btn-ghost" id="btn-run-engine">Run engine</button>
    </div>
  </header>

  <!-- Left Rail -->
  <nav class="rail">
    <div class="rail-group">
      <button class="rail-btn active" data-mode="graph" title="Graph view">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>
    <div class="rail-divider"></div>
    <div class="rail-group">
      <button class="rail-btn" data-mode="search" title="Search">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="rail-btn" data-mode="ingest" title="Ingest">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 19V5M5 12l7-7 7 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="rail-btn" data-mode="capture" title="Capture">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 8v8M8 12h8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>
  </nav>

  <!-- Main Canvas -->
  <main class="canvas">
    <canvas id="neural-bg"></canvas>
    <svg id="graph-svg"></svg>
    
    <!-- Filter Pills -->
    <div class="filter-pills">
      <button class="pill active" data-domain="all">All</button>
      <button class="pill" data-domain="database">Database</button>
      <button class="pill" data-domain="architecture">Architecture</button>
      <button class="pill" data-domain="authentication">Auth</button>
      <button class="pill" data-domain="infrastructure">Infrastructure</button>
      <button class="pill" data-domain="deployment">Deployment</button>
      <button class="pill" data-domain="framework">Framework</button>
    </div>

    <!-- Graph Toolbar -->
    <div class="graph-toolbar">
      <button class="toolbar-btn" id="btn-reset-view" title="Reset view">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 3v5h5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="toolbar-btn" id="btn-refresh" title="Refresh">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M23 4v6h-6M1 20v-6h6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-title">Edge Types</div>
      <div class="legend-item"><span class="legend-line caused-by"></span>Caused by</div>
      <div class="legend-item"><span class="legend-line supersedes"></span>Supersedes</div>
      <div class="legend-item"><span class="legend-line similar-to"></span>Similar to</div>
    </div>
  </main>

  <!-- Right Panel -->
  <aside class="panel" id="panel">
    <div class="panel-header">
      <h2 class="panel-title" id="panel-title">Details</h2>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body">
      <!-- Dynamic content -->
    </div>
  </aside>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <!-- Scripts -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/neural-bg.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/search.js"></script>
  <script src="js/ingest.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
