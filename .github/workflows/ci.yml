name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[test]" || pip install -r requirements.txt pytest pytest-cov
      - run: pytest tests/ -v --ignore=tests/test_api.py